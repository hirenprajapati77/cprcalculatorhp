version: '3.8'

services:
  cpr-db:
    image: postgres:15-alpine
    container_name: cpr-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cpr_pro
      TZ: Asia/Kolkata
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cpr-cache:
    image: redis:7-alpine
    container_name: cpr-cache
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: Asia/Kolkata
    volumes:
      - redis_data:/data

  cpr-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpr-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@cpr-db:5432/cpr_pro?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@cpr-cache:6379"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
      NODE_ENV: "production"
      RATE_LIMIT_MAX: "60"
      RATE_LIMIT_WINDOW_MS: "60000"
      MARKET_DATA_MODE: "live"
      TZ: Asia/Kolkata
    depends_on:
      - cpr-db
      - cpr-cache

volumes:
  postgres_data:
  redis_data:
